services:
  my-honey-pot:
    build: .
    container_name: my-honey-pot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
      - HIVE_USERNAME=${HIVE_USERNAME}
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4321/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    expose:
      - "4321"
    networks:
      - common_proxy_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.my-honey-pot.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.my-honey-pot.tls=true"
      - "traefik.http.services.my-honey-pot.loadbalancer.server.port=4321"
      - "traefik.http.routers.my-honey-pot.service=my-honey-pot"
      - "traefik.http.routers.my-honey-pot.entrypoints=websecure"

networks:
  common_proxy_network:
    external: true
